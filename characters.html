/* ===================== BASE ===================== */
body{
    margin:0;
    font-family:Arial;
    color:white;
    background:url("background.jpeg") center/cover no-repeat fixed;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    z-index:-1;
}

/* ===================== HEADER ===================== */
.header{
    text-align:center;
    margin-top:30px;
}

.title{
    font-size:28px;
    color:#00ffcc;
    font-weight:bold;
}

.ai-box{
    margin:10px auto;
    max-width:700px;
    padding:10px;
    border:1px solid rgba(0,255,255,0.5);
    border-radius:10px;
    font-size:13px;
    color:#bff;
    text-align:center;
    background:rgba(0,0,0,0.3);
}

/* ===================== FILTER ===================== */
.filters{
    text-align:center;
    margin:20px;
}

.filters button{
    margin:5px;
    padding:6px 12px;
    border:1px solid #00ffcc;
    background:black;
    color:#00ffcc;
    cursor:pointer;
}

.filters button:hover{
    background:#00ffcc;
    color:black;
}

/* ===================== GRID ===================== */
.grid{
    display:grid;
    grid-template-columns:repeat(6, 1fr);
    gap:12px;
    padding:15px;
}

@media (max-width:768px){
    .grid{
        grid-template-columns:repeat(2, 1fr);
    }
}

@media (max-width:480px){
    .grid{
        grid-template-columns:repeat(1, 1fr);
    }
}

/* ===================== CARD ===================== */
.card{
    position:relative;
    width:100%;
    height:230px;
    border-radius:12px;
    overflow:hidden;
    background:rgba(0,0,0,0.6);
    border:1px solid #00ffcc;
    cursor:pointer;
    transition:0.3s;
    aspect-ratio: 1/1.2;
}

/* hover effect */
.card:hover{
    transform:scale(1.05);
    z-index:10;
}

/* ===================== IMAGE ===================== */
.img-box{
    width:100%;
    height:140px;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:rgba(0,0,0,0.25);
    border-radius:8px;
}

/* KEY FIX HERE */
.img-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
}
/* ===================== TEXT ===================== */
.card h3{
    margin:8px 0 0;
    font-size:14px;
    color:#00ffcc;
    text-align:center;
}

/* ===================== FLIP SYSTEM ===================== */
.front, .back{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    transition:0.6s;
    border-radius:12px;
    background:rgba(0,0,0,0.6);
}

/* FRONT */
.front{
    transform:rotateY(0deg);
}

/* BACK */
.back{
    transform:rotateY(180deg);
    padding:10px;
    color:#00ffcc;
    font-size:13px;
}

/* FLIP ACTIVE */
.card.flipped .front{
    transform:rotateY(180deg);
}

.card.flipped .back{
    transform:rotateY(0deg);
}

/* ===================== IMAGE HOLD ZOOM ===================== */
.inspect-view{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.inspect-view img{
    max-width:90%;
    max-height:90%;
    object-fit:contain;
    border:2px solid #00ffcc;
    border-radius:10px;
    box-shadow:0 0 20px #00ffcc;
}

/* ===================== BUTTON ===================== */
#backBtn{
    position:absolute;
    top:20px;
    left:20px;
    padding:10px 16px;
    background:cyan;
    color:black;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    z-index:20;
}

</style>

/* 🔥 SINGLE RENDER ONLY */
function render(data){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    data.forEach((item, index) => {
        grid.innerHTML += `
        <div class="card" onclick="flipCard(this)">
            <div class="front">
                <div class="img-box">
                    <img src="${item.img}">
                </div>
                <h3>${item.name}</h3>
            </div>

            <div class="back">
                <p>${item.role ? "Role: " + item.role : ""}</p>
                <p>${item.power ? "Power: " + item.power : ""}</p>
                <p>Zone: ${item.zone}</p>
            </div>

        </div>
        `;
    });
}



/* 🔥 FILTERS */
function filterType(type){
    render(novazone.filter(i => i.type === type));
}

function filterAll(){

let holdTimer;

    if(e.target.tagName === "IMG"){
        holdTimer = setTimeout(()=>{
            openInspect(e.target.src);
        }, 400); // hold 0.4 sec
    }
});

document.addEventListener("mouseup", ()=>{
    clearTimeout(holdTimer);
});

document.addEventListener("touchstart", (e)=>{

    holdTimer = setTimeout(()=>{

}
}
);

document.addEventListener("touchend", ()=>{

});

function openInspect(src){
    document.getElementById("inspectImg").src = src;
    document.getElementById("inspectView").style.display = "flex";
}

function closeInspect(){
