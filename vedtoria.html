<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>ZENON  FICTIONAL FOREST</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

/* THREE CANVAS */

canvas{
    display:block;
}

/* TERMINAL */

#terminal{

    position:absolute;

    width:min(680px,90vw);
    height:102px;

    left:55%;
    bottom:100px;

    transform:translateX(-50%);

    background:rgba(0,0,0,0.82);

    border:3px solid forestgreen;

    border-radius:12px;

    box-shadow:0 0 20px forestgreen;

    overflow-y:auto;

    padding:20px;

    z-index:10;
}

/* SCROLLBAR */

#terminal::-webkit-scrollbar{

    width:8px;
}

#terminal::-webkit-scrollbar-thumb{

    background:forestgreen;
    border-radius:10px;
}

/* TERMINAL TEXT */

#terminalText{

    color:forestgreen;

    font-size:28px;

    line-height:42px;

    font-family:monospace;

    white-space:pre-wrap;
}

#backBtn{
    position:absolute;
    top:20px;
    left:20px;

    padding:12px 20px;

    background:forestgreen;
    color:black;

    border:none;
    border-radius:10px;

    font-weight:bold;
    cursor:pointer;

    z-index:20;
}

/* BUY BUTTON */

#buyBtn{

    position:absolute;

    bottom:30px;

    left:55%;

    transform:translateX(-50%);

    width:min(320px,80vw);

    padding:18px;

    font-size:22px;

    font-weight:bold;

    border:none;

    border-radius:12px;

    background:cyan;

    color:white;

    cursor:pointer;

    z-index:20;

    display:none;

    box-shadow:0 0 25px red;
}

</style>

<script type="importmap">
{
  "imports": {
    "three":"https://unpkg.com/three@0.158.0/build/three.module.js"
  }
}
</script>

</head>

<body>

    <button id="backBtn">
← RETURN TO UNIVERSE
</button>

<!-- TERMINAL -->

<div id="terminal">

<div id="terminalText">
    ABOUT
</div>

</div>

<!-- BUY BUTTON -->



<script type="module">

import * as THREE from "three";

/* ================= SCENE ================= */

const scene = new THREE.Scene();

/* ================= CAMERA ================= */

const camera = new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,3,8);

/* ================= RENDERER ================= */

const renderer = new THREE.WebGLRenderer({
    antialias:false
});
renderer.setPixelRatio(1);
renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(
renderer.domElement
);

renderer.setPixelRatio(
Math.min(window.devicePixelRatio,1)
);
if(window.innerWidth < 768){
    renderer.setPixelRatio(0.8);
}
else{
    renderer.setPixelRatio(1);
}

/* ================= HTML ELEMENTS ================= */

const terminalText =
document.getElementById("terminalText");

const buyBtn =
document.getElementById("buyBtn");

/* ================= LOADER ================= */

const loader = new THREE.TextureLoader();

/* ================= LAB BACKGROUND ================= */

loader.load(

"forest.jpeg",

(texture)=>{

    texture.colorSpace =
    THREE.SRGBColorSpace;


    scene.background = texture;
}

);


/* ================= LIGHTS ================= */

// ambient
const ambient = new THREE.AmbientLight(
0xffffff,
1.2
);

const sunLight = new THREE.DirectionalLight(
0xfff4cc,
2
);

sunLight.position.set(
5,
10,
5
);

scene.add(sunLight);

scene.add(ambient);

// cyan light
const cyanLight = new THREE.PointLight(
0x4CAF50,
2,
50
);

cyanLight.position.set(0,5,2);

scene.add(cyanLight);

// red alarm light


// under glow
const glowLight = new THREE.PointLight(
0x00ff66,
3,
20
);

glowLight.position.set(0,2,-2);

scene.add(glowLight);

/* ================= BOOK ================= */

const book = new THREE.Group();

/* BOOK TEXTURE */

const coverTexture = loader.load(
"./vedtoria_book.jpeg"
);

coverTexture.colorSpace =
THREE.SRGBColorSpace;

/* MATERIALS */

const frontMaterial =
new THREE.MeshStandardMaterial({
    map:coverTexture
});

const backMaterial =
new THREE.MeshStandardMaterial({
    map:coverTexture
});

const materials = [

new THREE.MeshStandardMaterial({
    color:0x111111
}),

new THREE.MeshStandardMaterial({
    color:0x111111
}),

new THREE.MeshStandardMaterial({
    color:0x111111
}),

new THREE.MeshStandardMaterial({
    color:0x111111
}),

frontMaterial,

backMaterial

];

/* BOOK BODY */

const body = new THREE.Mesh(

new THREE.BoxGeometry(
1,
1.4,
0.2
),

materials

);

book.add(body);

/* PAGES */

const pages = new THREE.Mesh(

new THREE.BoxGeometry(
0.08,
1.28,
0.17
),

new THREE.MeshStandardMaterial({
    color:0xeaeaea
})

);

pages.position.x = 0.46;

book.add(pages);

/* BOOK POSITION */

book.position.set(
1,
4,
-3
);

book.scale.set(
5,
5,
5
);

scene.add(book);

/* ================= TEXT ================= */

const fullText =

`A mysterious object crashes on Earth...and inside it, a boy unlike anything anyone has ever seen.
Thrown into a world he doesn't understand, he carries the fate of magical planet on his shoulders. Magic, ancient guardians and unseen enemies follow him across dimensions.

Every decisions could change the course of worlds, as secrets, battles, and cosmic forces collide. Can he survive the threats of universe far larger than Earth—and protect what's more precious?

Vedtoria: The fallen planet is a story about courage, magic, and the fight to protect a world beyond imagination.`;

/* ================= MODES ================= */

let mode = "lab";

let index = 0;

let display = "";

/* ================= AUDIO ================= */


/* ================= OPEN ABOUT ================= */
const typingSound = new Audio(
"typing.mp3"
);

window.addEventListener(
"click",
()=>{

    if(mode === "lab"){

        mode = "about";

        display = "";

        index = 0;

        lastType = 0;

    }

}
);



/* ================= BUY BUTTON ================= */
document
.getElementById("backBtn")
.addEventListener("click",()=>{

    window.location.href =
    "index.html";

});

/* ================= ANIMATE ================= */
let lastType = 0;
let t = 0;

function animate(){

requestAnimationFrame(
animate
);

t += 0.02;

/* FLOAT */

book.position.y =
4 + Math.sin(t * 0.4) * 0.12;

book.rotation.y += 0.001;

book.rotation.z =
Math.sin(t * 0.3) * 0.03;

glowLight.intensity =
3 + Math.sin(t * 0.5) * 0.3;

/* MODES */

if(mode === "lab"){

    ambient.intensity = 1.2;

    cyanLight.intensity = 4;

    glowLight.intensity = 5;

    glowLight.color.set(0x00ffff);


    frontMaterial.emissiveIntensity = 0;

    backMaterial.emissiveIntensity = 0;

    terminalText.innerText =
    "                    ABOUT             ";

}
else{

    ambient.intensity = 0.15;

    cyanLight.intensity = 0.4;

    glowLight.color.set(0x00ffff);

    glowLight.intensity = 5;

    if(
        index < fullText.length &&
        Date.now() - lastType > 80
    ){

        const letter =
        fullText.charAt(index);

        display += letter;

        index++;

        terminalText.innerText =
        display;

        lastType = Date.now();

      if(
    letter !== " " &&
    letter !== "\n"
){

    typingSound.pause();
    typingSound.currentTime = 0;

    typingSound.play()
    .catch(()=>{});

}
    }

    if(index >= fullText.length){

    typingSound.pause();
    typingSound.currentTime = 0;

}

}




/* RENDER */

renderer.render(
scene,
camera
);


}

animate();

/* ================= RESIZE ================= */


document.addEventListener(
"visibilitychange",
()=>{
    if(document.hidden){
        renderer.setAnimationLoop(null);
    }
    else{
        animate();
    }
}
);


window.addEventListener(

"resize",

()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}

);



</script>

</body>
</html>
